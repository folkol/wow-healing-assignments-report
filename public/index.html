<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cooldown Audit — Vanguard</title>
  <style>
    :root { color-scheme: dark; }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #0e0e12;
      color: #e2e8f0;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      margin: 0 0 6px;
      color: #f0f4ff;
    }

    .subtitle {
      color: #8898b8;
      margin: 0 0 36px;
      font-size: 0.95rem;
    }

    .card {
      background: #16181f;
      border: 1px solid #252836;
      border-radius: 12px;
      padding: 28px 28px 24px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #9ecbff;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      display: block;
      width: 100%;
      background: #1e2130;
      border: 1px solid #2e3352;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus {
      border-color: #5b7fcb;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      font-family: "Cascadia Code", "Fira Mono", "Consolas", monospace;
      font-size: 0.82rem;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row > .field {
      flex: 1;
    }

    details.advanced {
      margin-bottom: 20px;
    }

    details.advanced summary {
      cursor: pointer;
      color: #6b7fa8;
      font-size: 0.83rem;
      user-select: none;
      list-style: none;
    }

    details.advanced summary::before {
      content: "▶  ";
      font-size: 0.65rem;
    }

    details.advanced[open] summary::before {
      content: "▼  ";
    }

    .advanced-body {
      margin-top: 16px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #3b5bdb;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.02em;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #4c6ef5;
    }

    button[type="submit"]:disabled {
      background: #2a3555;
      color: #556080;
      cursor: not-allowed;
    }

    .result {
      margin-top: 24px;
      padding: 20px 22px;
      border-radius: 10px;
      display: none;
    }

    .result.success {
      background: rgba(40, 130, 70, 0.12);
      border: 1px solid rgba(40, 180, 90, 0.3);
    }

    .result.error {
      background: rgba(160, 50, 50, 0.14);
      border: 1px solid rgba(200, 60, 60, 0.3);
    }

    .result-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .result.success .result-label { color: #6ee7a0; }
    .result.error .result-label { color: #f87171; }

    .result-link {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .result-link a {
      color: #93c5fd;
      word-break: break-all;
      font-size: 0.9rem;
    }

    .copy-btn {
      flex-shrink: 0;
      padding: 5px 12px;
      background: #1e2d4a;
      border: 1px solid #2e4068;
      border-radius: 6px;
      color: #93c5fd;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .copy-btn:hover { background: #263556; }

    .error-text {
      font-size: 0.9rem;
      color: #fca5a5;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #3b5bdb;
      border-top-color: #93c5fd;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #8898b8;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cooldown Audit</h1>
    <p class="subtitle">
      Paste a Warcraft Logs report URL and your WowUtils healing assignments.<br>
      A shareable report link is generated server-side — WCL credentials are never exposed.
    </p>

    <div class="card">
      <form id="auditForm">
        <label for="reportUrl">Warcraft Logs Report URL</label>
        <input
          type="text"
          id="reportUrl"
          name="report"
          placeholder="https://www.warcraftlogs.com/reports/XXXXXXXXXXXXXXXXXX"
          required
          autocomplete="off"
          spellcheck="false"
        />

        <label for="assignments">WowUtils Assignments (paste "Copy CDs" output)</label>
        <textarea
          id="assignments"
          name="assignments"
          placeholder="Name:...; EncounterID:...; Difficulty:Mythic;&#10;time:30; spellid:98008; tag:Healername; bossSpell:12345;&#10;..."
          required
          spellcheck="false"
        ></textarea>

        <details class="advanced">
          <summary>Advanced options</summary>
          <div class="advanced-body">
            <div class="row">
              <div class="field">
                <label for="hitWindow">Hit window (seconds)</label>
                <input type="number" id="hitWindow" name="hitWindowSec" value="8" min="1" max="60" step="1" />
              </div>
              <div class="field">
                <label for="actualWindow">Actual window (seconds)</label>
                <input type="number" id="actualWindow" name="actualWindowSec" value="60" min="10" max="300" step="5" />
              </div>
            </div>
            <label for="sampleOffsets">Health sample offsets (comma-separated seconds)</label>
            <input type="text" id="sampleOffsets" name="sampleOffsets" value="-10,-5,0,5,10" />
          </div>
        </details>

        <button type="submit" id="submitBtn">Generate Report</button>
      </form>

      <div class="progress" id="progress">
        <span class="spinner"></span>
        <span id="progressText">Fetching WCL data, this may take 30–90 seconds…</span>
      </div>

      <div class="result" id="result">
        <div class="result-label" id="resultLabel"></div>
        <div class="result-link" id="resultLink"></div>
        <div class="error-text" id="errorText"></div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById("auditForm");
    const submitBtn = document.getElementById("submitBtn");
    const progressEl = document.getElementById("progress");
    const resultEl = document.getElementById("result");
    const resultLabel = document.getElementById("resultLabel");
    const resultLink = document.getElementById("resultLink");
    const errorText = document.getElementById("errorText");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      progressEl.style.display = "block";
      resultEl.style.display = "none";

      const rawOffsets = document.getElementById("sampleOffsets").value;
      const sampleOffsets = rawOffsets
        .split(",")
        .map((v) => parseFloat(v.trim()))
        .filter((v) => isFinite(v));

      const body = {
        report: document.getElementById("reportUrl").value.trim(),
        assignments: document.getElementById("assignments").value,
        hitWindowSec: parseFloat(document.getElementById("hitWindow").value),
        actualWindowSec: parseFloat(document.getElementById("actualWindow").value),
        sampleOffsets,
      };

      try {
        const resp = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        const data = await resp.json();

        if (!resp.ok || data.error) {
          showError(data.error ?? `HTTP ${resp.status}`);
        } else {
          showSuccess(data.url);
        }
      } catch (err) {
        showError(err.message ?? "Network error");
      } finally {
        submitBtn.disabled = false;
        progressEl.style.display = "none";
      }
    });

    function showSuccess(url) {
      resultEl.className = "result success";
      resultLabel.textContent = "Report ready";
      resultLink.innerHTML = `
        <a href="${escHtml(url)}" target="_blank" rel="noopener">${escHtml(url)}</a>
        <button class="copy-btn" onclick="copyUrl(${JSON.stringify(url)})">Copy</button>
      `;
      errorText.textContent = "";
      resultEl.style.display = "block";
      resultEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function showError(message) {
      resultEl.className = "result error";
      resultLabel.textContent = "Error";
      resultLink.innerHTML = "";
      errorText.textContent = message;
      resultEl.style.display = "block";
      resultEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function copyUrl(url) {
      navigator.clipboard.writeText(url).catch(() => {});
    }

    function escHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
